<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/campus-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Smart Campus Operations Hub frontend base UI for facilities, bookings, tickets, notifications, and role-based dashboards."
    />
    <script>
      try {
        const storedTheme = localStorage.getItem('smart-campus-theme');
        const resolvedTheme =
          storedTheme ??
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.style.colorScheme = resolvedTheme;
      } catch (error) {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
    <title>Smart Campus Operations Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
